{{define "content"}}
<section class="max-w-2xl mx-auto px-6 py-16">
    <h1 class="text-3xl font-bold tracking-tight">Account</h1>
    <p class="mt-2 text-sm text-slate-400">Signed in as {{.User.Email}}{{if .User.IsAdmin}} · <span class="text-sky-400">admin</span>{{end}}</p>

    {{/* --- Profile name --- */}}
    <section class="mt-12">
        <h2 class="text-sm uppercase tracking-widest text-slate-400">Display name</h2>
        <form hx-post="/account/name" hx-target="#name-msg" hx-swap="innerHTML" class="mt-4 flex flex-col sm:flex-row gap-3">
            <input type="text" name="name" value="{{.User.Name}}" placeholder="Your name" maxlength="100"
                   class="flex-1 px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
            <button type="submit" class="px-5 py-3 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold">Save</button>
        </form>
        <div id="name-msg" class="mt-2 text-sm"></div>
    </section>

    {{/* --- Email --- */}}
    <section class="mt-12">
        <h2 class="text-sm uppercase tracking-widest text-slate-400">Email</h2>
        <form hx-post="/account/email" hx-target="#email-msg" hx-swap="innerHTML" class="mt-4 space-y-3">
            <input type="email" name="email" value="{{.User.Email}}" required autocomplete="email"
                   class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
            <input type="password" name="current_password" required autocomplete="current-password" placeholder="Current password (required to change email)"
                   class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
            <button type="submit" class="px-5 py-3 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold">Update email</button>
            <div id="email-msg" class="text-sm"></div>
        </form>
    </section>

    {{/* --- Password --- */}}
    <section class="mt-12">
        <h2 class="text-sm uppercase tracking-widest text-slate-400">Password</h2>
        <form hx-post="/account/password" hx-target="#password-msg" hx-swap="innerHTML" class="mt-4 space-y-3">
            <input type="password" name="current_password" required autocomplete="current-password" placeholder="Current password"
                   class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
            <input type="password" name="new_password" required autocomplete="new-password" placeholder="New password (min 12 chars)" minlength="12"
                   class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
            <input type="password" name="confirm_password" required autocomplete="new-password" placeholder="Confirm new password"
                   class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
            <button type="submit" class="px-5 py-3 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold">Change password</button>
            <div id="password-msg" class="text-sm"></div>
        </form>
    </section>
</section>
{{end}}
