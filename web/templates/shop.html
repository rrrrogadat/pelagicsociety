{{define "content"}}
<section class="max-w-3xl mx-auto px-6 py-28 text-center">
    <p class="uppercase tracking-[0.3em] text-sky-400 text-sm">Shop</p>
    <h1 class="mt-4 text-5xl md:text-6xl font-bold tracking-tight">Coming soon.</h1>
    <p class="mt-6 text-lg text-slate-300">Apparel and gear, built for the water. Limited drops only.</p>
    <form hx-post="/waitlist" hx-target="#waitlist-msg" hx-swap="innerHTML" class="mt-10 flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
        <input type="email" name="email" required placeholder="you@example.com" class="flex-1 px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
        <button type="submit" class="px-6 py-3 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold">Notify me</button>
    </form>
    <div id="waitlist-msg" class="mt-4 text-sm"></div>
</section>
{{end}}
