{{define "nav"}}
<header x-data="{ open: false }" class="border-b border-slate-800/60 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="/" class="font-bold tracking-widest text-lg uppercase">Pelagic Society</a>
        <nav class="hidden md:flex gap-8 text-sm uppercase tracking-wide">
            <a href="/about" class="hover:text-sky-400 transition">About</a>
            <a href="/gallery" class="hover:text-sky-400 transition">Gallery</a>
            <a href="/shop" class="hover:text-sky-400 transition">Shop</a>
            <a href="/contact" class="hover:text-sky-400 transition">Contact</a>
        </nav>
        <button @click="open = !open" class="md:hidden" aria-label="Menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
    </div>
    <div x-show="open" x-cloak class="md:hidden border-t border-slate-800/60">
        <nav class="flex flex-col px-6 py-4 gap-3 text-sm uppercase tracking-wide">
            <a href="/about">About</a>
            <a href="/gallery">Gallery</a>
            <a href="/shop">Shop</a>
            <a href="/contact">Contact</a>
        </nav>
    </div>
</header>
{{end}}

{{define "footer"}}
<footer class="border-t border-slate-800/60 mt-16">
    <div class="max-w-6xl mx-auto px-6 py-10 flex flex-col md:flex-row gap-6 items-center justify-between text-sm text-slate-400">
        <p>&copy; 2026 Pelagic Society</p>
        <div class="flex gap-5">
            <a href="https://www.youtube.com/@pelagicsociety" target="_blank" rel="noopener" class="hover:text-sky-400">YouTube</a>
            <a href="https://www.instagram.com/pelagicsociety" target="_blank" rel="noopener" class="hover:text-sky-400">Instagram</a>
            <a href="https://www.tiktok.com/@pelagicsociety" target="_blank" rel="noopener" class="hover:text-sky-400">TikTok</a>
        </div>
    </div>
</footer>
{{end}}
