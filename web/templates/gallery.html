{{define "content"}}
<section class="max-w-6xl mx-auto px-6 py-20">
    {{template "block_view" .Heading}}
    <div class="mt-4">
        {{template "block_view" .Intro}}
    </div>

    {{template "gallery_grid" .}}
</section>

{{if .CanEdit}}
{{/* Floating admin add button + modal — only surfaces for admins so the
     base page view matches what visitors see. */}}
<div x-data="{ open: false, tab: 'photo' }" @keydown.escape.window="open = false">
    <button type="button" @click="open = true"
            class="fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full bg-sky-500 hover:bg-sky-400 text-slate-950 shadow-2xl shadow-sky-500/30 flex items-center justify-center transition"
            aria-label="Add to gallery">
        {{icon "plus" "w-6 h-6"}}
    </button>

    <div x-show="open" x-cloak
         x-transition.opacity
         class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-end md:items-center justify-center p-4"
         @click.self="open = false"
         @htmx:after-request="if ($event.detail.successful) open = false">
        <div class="w-full max-w-lg rounded-2xl bg-slate-900 border border-slate-800 shadow-2xl overflow-hidden"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0">
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-800">
                <div class="flex gap-1 text-sm">
                    <button @click="tab = 'photo'" :class="tab === 'photo' ? 'bg-slate-800 text-slate-100' : 'text-slate-400 hover:text-slate-200'" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md transition">
                        {{icon "image-plus" "w-4 h-4"}}
                        Photo
                    </button>
                    <button @click="tab = 'video'" :class="tab === 'video' ? 'bg-slate-800 text-slate-100' : 'text-slate-400 hover:text-slate-200'" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md transition">
                        {{icon "film" "w-4 h-4"}}
                        Video
                    </button>
                </div>
                <button @click="open = false" class="text-slate-400 hover:text-slate-200 transition" aria-label="Close">
                    {{icon "x" "w-5 h-5"}}
                </button>
            </div>

            <div class="p-5">
                <form x-show="tab === 'photo'"
                      hx-post="/admin/gallery/upload"
                      hx-target="#gallery-grid"
                      hx-swap="outerHTML"
                      hx-encoding="multipart/form-data"
                      hx-on::after-request="if(event.detail.successful) this.reset()"
                      class="space-y-3">
                    <label class="block text-xs uppercase tracking-widest text-slate-400">Photo file</label>
                    <input type="file" name="photo" accept="image/jpeg,image/png,image/webp" required
                           class="block w-full text-sm text-slate-300 file:mr-3 file:px-3 file:py-2 file:rounded file:border-0 file:bg-sky-500 file:text-slate-950 file:font-semibold hover:file:bg-sky-400">
                    <input type="text" name="caption" placeholder="Caption (optional)"
                           class="w-full px-3 py-2 rounded bg-slate-950 border border-slate-700 focus:outline-none focus:border-sky-500 text-sm">
                    <button type="submit" class="inline-flex items-center gap-1.5 px-4 py-2 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold text-sm transition">
                        {{icon "upload" "w-4 h-4"}}
                        Upload
                    </button>
                </form>

                <form x-show="tab === 'video'" x-cloak
                      hx-post="/admin/gallery/video"
                      hx-target="#gallery-grid"
                      hx-swap="outerHTML"
                      hx-on::after-request="if(event.detail.successful) this.reset()"
                      class="space-y-3">
                    <label class="block text-xs uppercase tracking-widest text-slate-400">YouTube URL</label>
                    <input type="url" name="url" placeholder="https://youtube.com/watch?v=..." required
                           class="w-full px-3 py-2 rounded bg-slate-950 border border-slate-700 focus:outline-none focus:border-sky-500 text-sm">
                    <input type="text" name="caption" placeholder="Caption (optional)"
                           class="w-full px-3 py-2 rounded bg-slate-950 border border-slate-700 focus:outline-none focus:border-sky-500 text-sm">
                    <button type="submit" class="inline-flex items-center gap-1.5 px-4 py-2 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold text-sm transition">
                        {{icon "plus" "w-4 h-4"}}
                        Add
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}
{{end}}
