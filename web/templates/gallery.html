{{define "content"}}
<section class="max-w-6xl mx-auto px-6 py-20">
    {{template "block_view" .Heading}}
    <div class="mt-4">
        {{template "block_view" .Intro}}
    </div>

    {{if .CanEdit}}
    <div class="mt-10 grid md:grid-cols-2 gap-4">
        <form hx-post="/admin/gallery/upload"
              hx-target="#gallery-grid"
              hx-swap="outerHTML"
              hx-encoding="multipart/form-data"
              hx-on::after-request="if(event.detail.successful) this.reset()"
              class="rounded-lg border border-slate-800 p-5 space-y-3">
            <h3 class="text-sm uppercase tracking-widest text-slate-400">Upload photo</h3>
            <input type="file" name="photo" accept="image/jpeg,image/png,image/webp" required
                   class="block w-full text-sm text-slate-300 file:mr-3 file:px-3 file:py-2 file:rounded file:border-0 file:bg-sky-500 file:text-slate-950 file:font-semibold hover:file:bg-sky-400">
            <input type="text" name="caption" placeholder="Caption (optional)"
                   class="w-full px-3 py-2 rounded bg-slate-950 border border-slate-800 focus:outline-none focus:border-sky-500 text-sm">
            <button type="submit" class="px-4 py-2 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold text-sm">Upload</button>
        </form>

        <form hx-post="/admin/gallery/video"
              hx-target="#gallery-grid"
              hx-swap="outerHTML"
              hx-on::after-request="if(event.detail.successful) this.reset()"
              class="rounded-lg border border-slate-800 p-5 space-y-3">
            <h3 class="text-sm uppercase tracking-widest text-slate-400">Add YouTube video</h3>
            <input type="url" name="url" placeholder="https://youtube.com/watch?v=..." required
                   class="w-full px-3 py-2 rounded bg-slate-950 border border-slate-800 focus:outline-none focus:border-sky-500 text-sm">
            <input type="text" name="caption" placeholder="Caption (optional)"
                   class="w-full px-3 py-2 rounded bg-slate-950 border border-slate-800 focus:outline-none focus:border-sky-500 text-sm">
            <button type="submit" class="px-4 py-2 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold text-sm">Add</button>
        </form>
    </div>
    {{end}}

    {{template "gallery_grid" .}}
</section>
{{end}}
