{{define "content"}}
<section class="max-w-2xl mx-auto px-6 py-20">
    <h1 class="text-5xl font-bold tracking-tight">Contact</h1>
    <p class="mt-4 text-slate-400">Sponsorships, collaborations, press, or just saying hi.</p>

    <form hx-post="/contact" hx-target="#contact-msg" hx-swap="innerHTML" class="mt-10 space-y-5">
        <div>
            <label class="block text-sm uppercase tracking-wide text-slate-400 mb-2">Inquiry type</label>
            <select name="kind" class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
                <option value="business">Business / Sponsorship</option>
                <option value="press">Press</option>
                <option value="collab">Collaboration</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div>
            <label class="block text-sm uppercase tracking-wide text-slate-400 mb-2">Name</label>
            <input type="text" name="name" required class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
        </div>
        <div>
            <label class="block text-sm uppercase tracking-wide text-slate-400 mb-2">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
        </div>
        <div>
            <label class="block text-sm uppercase tracking-wide text-slate-400 mb-2">Message</label>
            <textarea name="message" required rows="6" class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400"></textarea>
        </div>
        <button type="submit" class="px-6 py-3 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold">Send</button>
        <div id="contact-msg" class="text-sm"></div>
    </form>
</section>
{{end}}
