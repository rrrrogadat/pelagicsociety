{{define "content"}}
<section class="max-w-md mx-auto px-6 py-20">
    <h1 class="text-3xl font-bold tracking-tight">Sign in</h1>
    <p class="mt-2 text-sm text-slate-400">Pelagic Society admin.</p>

    <form hx-post="/login" hx-target="#login-msg" hx-swap="innerHTML" class="mt-8 space-y-5">
        <input type="hidden" name="next" value="{{.Next}}">
        <div>
            <label class="block text-sm uppercase tracking-wide text-slate-400 mb-2">Email</label>
            <input type="email" name="email" autocomplete="username" required autofocus
                   class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
        </div>
        <div>
            <label class="block text-sm uppercase tracking-wide text-slate-400 mb-2">Password</label>
            <input type="password" name="password" autocomplete="current-password" required
                   class="w-full px-4 py-3 rounded bg-slate-900 border border-slate-700 focus:outline-none focus:border-sky-400">
        </div>
        <button type="submit"
                class="w-full px-6 py-3 rounded bg-sky-500 hover:bg-sky-400 text-slate-950 font-semibold">
            Sign in
        </button>
        <div id="login-msg" class="text-sm"></div>
    </form>
</section>
{{end}}
