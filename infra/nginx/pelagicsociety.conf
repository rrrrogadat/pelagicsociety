# Pelagic Society — nginx reverse proxy
# Expects TLS certs from certbot at /etc/letsencrypt/live/pelagicsociety.com/
# Run bootstrap.sh once to obtain certs.

# Redirect plain HTTP -> HTTPS (except ACME challenge)
server {
    listen 80;
    listen [::]:80;
    server_name pelagicsociety.com www.pelagicsociety.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://pelagicsociety.com$request_uri;
    }
}

# Redirect www -> apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pelagicsociety.com;

    ssl_certificate     /etc/letsencrypt/live/pelagicsociety.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pelagicsociety.com/privkey.pem;

    return 301 https://pelagicsociety.com$request_uri;
}

# Main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pelagicsociety.com;

    ssl_certificate     /etc/letsencrypt/live/pelagicsociety.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pelagicsociety.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 2m;

    # Maintenance page: if /var/www/pelagicsociety/maintenance/.enabled exists,
    # serve 503 with the static maintenance page.
    if (-f /var/www/pelagicsociety/maintenance/.enabled) {
        return 503;
    }
    error_page 503 @maintenance;
    location @maintenance {
        root /var/www/pelagicsociety/maintenance;
        rewrite ^(.*)$ /index.html break;
    }

    # Long cache for embedded static assets (hash-less but low-churn).
    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
